<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa da Saúde — Produtos Recomendados</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue-dark:   #0047CC;
  --blue-main:   #0A6EFF;
  --blue-mid:    #1A8AFF;
  --blue-light:  #E8F2FF;
  --blue-pale:   #F0F6FF;
  --yellow:      #FFD600;
  --white:       #FFFFFF;
  --text:        #0D1F4E;
  --muted:       #5A72A0;
  --border:      #D0E2FF;
  --radius:      14px;
  --radius-sm:   10px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--blue-pale);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
header img {
  height: 48px;
  width: auto;
  max-width: 88%;
  display: block;
}



/* ── HERO STRIP ── */
.hero-strip {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-main) 100%);
  padding: 22px 16px 20px;
  text-align: center;
  color: var(--white);
}

.hero-social {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.hero-social-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.4);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 9px 16px;
  border-radius: 50px;
  text-decoration: none;
  transition: background 0.15s;
}
.hero-social-btn:active { background: rgba(255,255,255,0.3); }
.hero-social-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
.hero-social-btn.whats { background: rgba(37,211,102,0.35); border-color: rgba(37,211,102,0.6); }

.hero-strip p {
  font-size: 18px;
  font-weight: 600;
  opacity: 0.88;
  line-height: 1.5;
  max-width: 340px;
  margin: 0 auto;
}

/* ── MAIN ── */
main {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 12px 40px;
}

/* ── VITRINE ── */
.vitrine {
  margin-top: 24px;
}
.vitrine-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  padding: 0 2px;
}
.vitrine-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--blue-main);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.vitrine-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--blue-dark);
  letter-spacing: -0.2px;
}
.vitrine-line {
  flex: 1;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
}

/* ── GRADE 2 COLUNAS ── */
.grade {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.18s, box-shadow 0.18s;
  text-decoration: none;
  color: inherit;
}
.card:active { transform: scale(0.97); }

.card-img-wrap {
  background: var(--blue-pale);
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.card-body {
  padding: 10px 10px 12px;
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 6px;
}
.card-name {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
}
.card-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  flex: 1;
}
.card-price {
  font-size: 15px;
  font-weight: 800;
  color: var(--blue-dark);
  margin-top: 2px;
}
.card-btn {
  display: block;
  width: 100%;
  background: var(--blue-main);
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  padding: 8px 6px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  text-decoration: none;
  transition: background 0.15s;
}
.card-btn:active { background: var(--blue-dark); }






@media (min-width: 480px) {
  .card-name { font-size: 13.5px; }
  .card-desc { font-size: 12px; }
}



</style>
